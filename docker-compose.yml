version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - default

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - FRONTEND_URL=http://localhost:3004,http://10.0.7.3:3004,https://pros.iorana.dev
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - REDIS_URL=redis://redis:6379
      - SERP_API_KEY=${SERP_API_KEY}
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - coolify
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.io-prospector-api.rule=Host(`api.pros.iorana.dev`)"
      - "traefik.http.routers.io-prospector-api.entrypoints=https"
      - "traefik.http.routers.io-prospector-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.io-prospector-api-service.loadbalancer.server.port=4000"

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        - NODE_ENV=production
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-https://zvehtloitnuglyjtxwye.supabase.co}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-sb_publishable_B0gQyDyf-p2vDg2UhytfDg_H54mWXbB}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - N8N_WHATSAPP_WEBHOOK_URL=${N8N_WHATSAPP_WEBHOOK_URL:-https://n8n.iorana.dev/webhook/twilio-whatsapp-envio}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - coolify
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.io-prospector-web.rule=Host(`pros.iorana.dev`)"
      - "traefik.http.routers.io-prospector-web.entrypoints=https"
      - "traefik.http.routers.io-prospector-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.io-prospector-web-service.loadbalancer.server.port=3004"

networks:
  coolify:
    external: true
  default:
    driver: bridge
